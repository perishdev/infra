name: CI

# Fork-safe lint and validate gates. No secrets, no state access.
# Real plans / applies run in HCP Terraform via its own VCS integration
# (see docs/ci.md) — they are intentionally not triggered from this workflow.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.9.8"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - run: terraform fmt -check -recursive terraform/

  validate:
    name: terraform validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - terraform/cloudflare
          - terraform/github
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - name: terraform init (no backend)
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false -input=false
      - name: terraform validate
        working-directory: ${{ matrix.dir }}
        run: terraform validate
